name: Build & Push and Update GitOps deploy tag

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths-ignore:
      - ".github/**"

permissions:
  contents: write
  id-token: write

jobs:
  deploy-onprem:
    if: ${{ (vars.ENABLE_ONPREM || 'false') == 'true' && github.actor != 'github-actions[bot]' }}
    runs-on: my-blog-runner

    env:
      IMAGE_NAME: son-blog
      KUSTOMIZATION_FILE: overlays/onprem/prod/kustomization.yaml
      HARBOR_REGISTRY: harbor.onprem.arpa
      HARBOR_PROJECT: son
      HARBOR_REPOSITORY: blog
      HARBOR_SCHEME: https

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image env
        run: |
          echo "IMAGE_REPOSITORY=${HARBOR_REGISTRY}/${HARBOR_PROJECT}/${HARBOR_REPOSITORY}" >> $GITHUB_ENV

      - name: Login to Harbor
        env:
          HARBOR_USERNAME: ${{ secrets.HARBOR_USERNAME }}
          HARBOR_PASSWORD: ${{ secrets.HARBOR_PASSWORD }}
        run: |
          echo "${HARBOR_PASSWORD}" | docker login "${HARBOR_REGISTRY}" \
            --username "${HARBOR_USERNAME}" \
            --password-stdin

      - name: Calculate next image tag
        id: next_tag
        env:
          HARBOR_USERNAME: ${{ secrets.HARBOR_USERNAME }}
          HARBOR_PASSWORD: ${{ secrets.HARBOR_PASSWORD }}
        run: |
          JSON="$(curl -kfsSL \
            -u "${HARBOR_USERNAME}:${HARBOR_PASSWORD}" \
            "${HARBOR_SCHEME}://${HARBOR_REGISTRY}/api/v2.0/projects/${HARBOR_PROJECT}/repositories/${HARBOR_REPOSITORY}/artifacts?page_size=100")"

          NEXT_TAG="$(echo "$JSON" | python3 .github/scripts/calc_next_tag.py)"
          echo "NEXT_TAG=${NEXT_TAG}" >> $GITHUB_ENV

      - name: Build and push Docker image
        run: |
          docker build -t "${IMAGE_NAME}:${NEXT_TAG}" .
          docker tag "${IMAGE_NAME}:${NEXT_TAG}" "${IMAGE_REPOSITORY}:${NEXT_TAG}"
          docker push "${IMAGE_REPOSITORY}:${NEXT_TAG}"

      - name: Checkout GitOps repository
        uses: actions/checkout@v4
        with:
          repository: Son-Hunseo/blog-gitops
          token: ${{ secrets.BLOG_GITOPS_TOKEN }}
          path: blog-gitops

      - name: Update on-prem kustomization image tag
        run: |
          sed -i -E \
            "s|(^[[:space:]]*newTag:[[:space:]]*).*$|\1\"${NEXT_TAG}\"|" \
            "blog-gitops/${KUSTOMIZATION_FILE}"

      - name: Commit and push GitOps manifest
        run: |
          cd blog-gitops
          git config user.name github-actions[bot]
          git config user.email github-actions[bot]@users.noreply.github.com
          git add "${KUSTOMIZATION_FILE}"
          git commit -m "chore(gitops): bump on-prem image tag to ${NEXT_TAG}" || exit 0
          git push

  deploy-aws:
    if: ${{ (vars.ENABLE_AWS || 'true') == 'true' && github.actor != 'github-actions[bot]' }}
    runs-on: ubuntu-latest

    env:
      AWS_REGION: ap-northeast-2
      IMAGE_NAME: son-blog
      KUSTOMIZATION_FILE: overlays/aws/prod/kustomization.yaml
      ECR_REPOSITORY: blog

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ secrets.AWS_ECR_PUSH_ROLE_ARN }}

      - name: Login to Amazon ECR
        id: ecr_login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set image env
        run: |
          echo "ECR_REGISTRY=${{ steps.ecr_login.outputs.registry }}" >> $GITHUB_ENV
          echo "IMAGE_REPOSITORY=${{ steps.ecr_login.outputs.registry }}/${ECR_REPOSITORY}" >> $GITHUB_ENV

      - name: Calculate next image tag
        run: |
          JSON="$(aws ecr describe-images \
            --region "${AWS_REGION}" \
            --repository-name "${ECR_REPOSITORY}" \
            --query 'imageDetails[].imageTags[]' \
            --output json 2>/dev/null || echo '[]')"

          NEXT_TAG="$(echo "$JSON" | python3 .github/scripts/calc_next_tag.py)"
          echo "NEXT_TAG=${NEXT_TAG}" >> $GITHUB_ENV

      - name: Build and push Docker image
        run: |
          docker build -t "${IMAGE_NAME}:${NEXT_TAG}" .
          docker tag "${IMAGE_NAME}:${NEXT_TAG}" "${IMAGE_REPOSITORY}:${NEXT_TAG}"
          docker push "${IMAGE_REPOSITORY}:${NEXT_TAG}"

      - name: Checkout GitOps repository
        uses: actions/checkout@v4
        with:
          repository: Son-Hunseo/blog-gitops
          token: ${{ secrets.BLOG_GITOPS_TOKEN }}
          path: blog-gitops

      - name: Update AWS kustomization image
        run: |
          sed -i -E \
            "s|(^[[:space:]]*newName:[[:space:]]*).*$|\1${IMAGE_REPOSITORY}|" \
            "blog-gitops/${KUSTOMIZATION_FILE}"
          sed -i -E \
            "s|(^[[:space:]]*newTag:[[:space:]]*).*$|\1\"${NEXT_TAG}\"|" \
            "blog-gitops/${KUSTOMIZATION_FILE}"

      - name: Commit and push GitOps manifest
        run: |
          cd blog-gitops
          git config user.name github-actions[bot]
          git config user.email github-actions[bot]@users.noreply.github.com
          git add "${KUSTOMIZATION_FILE}"
          git commit -m "chore(gitops): bump AWS image tag to ${NEXT_TAG}" || exit 0
          git push
